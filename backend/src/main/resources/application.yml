spring:
  profiles:
    active: local # 기본 활성화할 프로파일을 local로 지정
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?sslmode=require&prepareThreshold=0
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      idle-timeout: 30000 # 30초
      max-lifetime: 1800000 # 30분
      connection-timeout: 20000 # 20초
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:placeholder_email@gmail.com}
    password: ${MAIL_PASSWORD:placeholder_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html      # Swagger 접속 경로 지정
    groups-order: DESC
    operations-sorter: alpha
  api-docs:
    path: /api-docs             # OpenAPI Spec JSON을 조회할 경로

ai:
  gemini:
    api-key-primary: ${GEMINI_API_KEY_PRIMARY:${GEMINI_API_KEY:none}}
    api-key-secondary: ${GEMINI_API_KEY_SECONDARY:none}
    api-key-tertiary: ${GEMINI_API_KEY_TERTIARY:none}
  groq:
    api-key: ${GROQ_API_KEY:none}

app:
  frontend-url: "${FRONTEND_URL:https://interview-prep-handbook-1xr5.vercel.app}"
  backend-url: "${BACKEND_URL:http://localhost:8080}"


